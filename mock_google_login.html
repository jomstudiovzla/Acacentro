<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión: Cuentas de Google</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #202124;
        }
        .google-card {
            width: 100%;
            max-width: 450px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 40px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @media (max-width: 450px) {
            .google-card {
                border: none;
                padding: 20px;
            }
        }
        .google-logo {
            width: 74px;
            height: 24px;
            margin-bottom: 16px;
        }
        .title {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.3333;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            color: #202124;
            margin-bottom: 28px;
            text-align: center;
        }
        .account-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #dadce0;
            border-bottom: 1px solid #dadce0;
            margin-bottom: 28px;
        }
        .account-item {
            width: 100%;
            padding: 12px 0;
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-align: left;
            border-bottom: 1px solid #f1f3f4;
            transition: background-color 0.15s ease;
        }
        .account-item:last-child {
            border-bottom: none;
        }
        .account-item:hover {
            background-color: #f8f9fa;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #dadce0;
        }
        .account-details {
            display: flex;
            flex-direction: column;
        }
        .account-name {
            font-size: 14px;
            font-weight: 500;
            color: #3c4043;
        }
        .account-email {
            font-size: 12px;
            color: #5f6368;
        }
        .use-other-btn {
            width: 100%;
            background: none;
            border: none;
            padding: 16px 0;
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            transition: background-color 0.15s ease;
        }
        .use-other-btn:hover {
            background-color: #f8f9fa;
        }
        .use-other-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #f1f3f4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5f6368;
            font-size: 18px;
        }
        .form-container {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        .input-group {
            position: relative;
            width: 100%;
        }
        .google-input {
            width: 100%;
            padding: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.15s ease;
        }
        .google-input:focus {
            border-color: #1a73e8;
            border-width: 2px;
            padding: 15px; /* Adjust padding to keep elements aligned */
        }
        .google-input:focus + .floating-label,
        .google-input:not(:placeholder-shown) + .floating-label {
            top: -8px;
            left: 10px;
            font-size: 12px;
            color: #1a73e8;
            background-color: #fff;
            padding: 0 4px;
        }
        .floating-label {
            position: absolute;
            left: 16px;
            top: 18px;
            color: #5f6368;
            font-size: 16px;
            pointer-events: none;
            transition: all 0.15s ease;
        }
        .button-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .link-btn {
            background: none;
            border: none;
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }
        .link-btn:hover {
            color: #1557b0;
        }
        .primary-btn {
            background-color: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .primary-btn:hover {
            background-color: #1557b0;
        }
    </style>
</head>
<body>

    <div class="google-card" id="account-chooser-view">
        <svg class="google-logo" viewBox="0 0 74 24" fill="currentColor">
            <path d="M9.24 5c-1.7 0-3.27.7-4.38 1.95V5.5H2v13h2.86v-6.95c1.1 1.25 2.68 1.95 4.38 1.95 3.32 0 6.07-2.6 6.07-6.75S12.56 5 9.24 5zm0 10.6c-2 0-3.66-1.6-3.66-3.85S7.24 7.9 9.24 7.9s3.66 1.6 3.66 3.85-1.66 3.85-3.66 3.85zm12.3-10.6c-1.46 0-2.8.63-3.75 1.7V5.5h-2.86v13h2.86V11.5c.95 1.07 2.29 1.7 3.75 1.7 2.8 0 5-2.2 5-6.6s-2.2-6.6-5-6.6zm0 10.6c-1.7 0-3.05-1.35-3.05-3.85s1.35-3.85 3.05-3.85 3.05 1.35 3.05 3.85-1.35 3.85-3.05 3.85zM38 5c-3.5 0-6.1 2.6-6.1 6.75s2.6 6.75 6.1 6.75c3.5 0 6.1-2.6 6.1-6.75S41.5 5 38 5zm0 10.6c-2 0-3.25-1.6-3.25-3.85S36 7.9 38 7.9s3.25 1.6 3.25 3.85-1.25 3.85-3.25 3.85zm14-10.6c-1.46 0-2.8.63-3.75 1.7V5.5H45.4v13h2.86V11.5c.95 1.07 2.29 1.7 3.75 1.7 2.8 0 5-2.2 5-6.6s-2.2-6.6-5-6.6zm0 10.6c-1.7 0-3.05-1.35-3.05-3.85s1.35-3.85 3.05-3.85 3.05 1.35 3.05 3.85-1.35 3.85-3.05 3.85zm9.5-10.6c-3.5 0-6.1 2.6-6.1 6.75s2.6 6.75 6.1 6.75c3.5 0 6.1-2.6 6.1-6.75S65 5 61.5 5zm0 10.6c-2 0-3.25-1.6-3.25-3.85s1.25-3.85 3.25-3.85 3.25 1.6 3.25 3.85-1.25 3.85-3.25 3.85zM71 5.5v2h2.86v-2zm0 4.5v8.5h2.86V10z" fill="#757575"/>
        </svg>

        <h1 class="title">Elige una cuenta</h1>
        <p class="subtitle">para ir a <strong>ACACENTRO</strong></p>

        <div class="account-list">
            <!-- Cuenta 1 -->
            <button class="account-item" onclick="selectAccount('Ana María González', 'ana.gonzalez@gmail.com', 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100')">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&auto=format&fit=crop&q=80" class="avatar" alt="Ana">
                <div class="account-details">
                    <span class="account-name">Ana María González</span>
                    <span class="account-email">ana.gonzalez@gmail.com</span>
                </div>
            </button>

            <!-- Cuenta 2 -->
            <button class="account-item" onclick="selectAccount('Pedro Pérez', 'pedro.perez@gmail.com', 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100')">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&auto=format&fit=crop&q=80" class="avatar" alt="Pedro">
                <div class="account-details">
                    <span class="account-name">Pedro Pérez</span>
                    <span class="account-email">pedro.perez@gmail.com</span>
                </div>
            </button>

            <!-- Cuenta 3 -->
            <button class="account-item" onclick="selectAccount('María Alejandra Silva', 'm.silva@gmail.com', 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100')">
                <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&auto=format&fit=crop&q=80" class="avatar" alt="María">
                <div class="account-details">
                    <span class="account-name">María Alejandra Silva</span>
                    <span class="account-email">m.silva@gmail.com</span>
                </div>
            </button>

            <!-- Usar otra cuenta -->
            <button class="use-other-btn" onclick="showCustomForm()">
                <div class="use-other-icon">👤</div>
                <div class="account-details">
                    <span class="account-name" style="color: #1a73e8;">Usar otra cuenta</span>
                </div>
            </button>
        </div>
    </div>

    <!-- Formulario de Cuenta Personalizada -->
    <div class="google-card" id="custom-form-view" style="display: none;">
        <svg class="google-logo" viewBox="0 0 74 24" fill="currentColor" style="margin-bottom: 24px;">
            <path d="M9.24 5c-1.7 0-3.27.7-4.38 1.95V5.5H2v13h2.86v-6.95c1.1 1.25 2.68 1.95 4.38 1.95 3.32 0 6.07-2.6 6.07-6.75S12.56 5 9.24 5zm0 10.6c-2 0-3.66-1.6-3.66-3.85S7.24 7.9 9.24 7.9s3.66 1.6 3.66 3.85-1.66 3.85-3.66 3.85zm12.3-10.6c-1.46 0-2.8.63-3.75 1.7V5.5h-2.86v13h2.86V11.5c.95 1.07 2.29 1.7 3.75 1.7 2.8 0 5-2.2 5-6.6s-2.2-6.6-5-6.6zm0 10.6c-1.7 0-3.05-1.35-3.05-3.85s1.35-3.85 3.05-3.85 3.05 1.35 3.05 3.85-1.35 3.85-3.05 3.85zM38 5c-3.5 0-6.1 2.6-6.1 6.75s2.6 6.75 6.1 6.75c3.5 0 6.1-2.6 6.1-6.75S41.5 5 38 5zm0 10.6c-2 0-3.25-1.6-3.25-3.85S36 7.9 38 7.9s3.25 1.6 3.25 3.85-1.25 3.85-3.25 3.85zm14-10.6c-1.46 0-2.8.63-3.75 1.7V5.5H45.4v13h2.86V11.5c.95 1.07 2.29 1.7 3.75 1.7 2.8 0 5-2.2 5-6.6s-2.2-6.6-5-6.6zm0 10.6c-1.7 0-3.05-1.35-3.05-3.85s1.35-3.85 3.05-3.85 3.05 1.35 3.05 3.85-1.35 3.85-3.05 3.85zm9.5-10.6c-3.5 0-6.1 2.6-6.1 6.75s2.6 6.75 6.1 6.75c3.5 0 6.1-2.6 6.1-6.75S65 5 61.5 5zm0 10.6c-2 0-3.25-1.6-3.25-3.85s1.25-3.85 3.25-3.85 3.25 1.6 3.25 3.85-1.25 3.85-3.25 3.85zM71 5.5v2h2.86v-2zm0 4.5v8.5h2.86V10z" fill="#757575"/>
        </svg>

        <h1 class="title">Iniciar sesión</h1>
        <p class="subtitle" style="margin-bottom: 24px;">Usa tu cuenta de Google para ir a ACACENTRO</p>

        <form class="form-container" style="display: flex;" onsubmit="submitCustom(event)">
            <div class="input-group">
                <input type="text" id="custom-name" class="google-input" placeholder=" " required>
                <label class="floating-label" for="custom-name">Nombre Completo</label>
            </div>
            
            <div class="input-group">
                <input type="email" id="custom-email" class="google-input" placeholder=" " required>
                <label class="floating-label" for="custom-email">Correo electrónico (Gmail)</label>
            </div>

            <div class="button-bar">
                <button type="button" class="link-btn" onclick="showChooser()">Volver</button>
                <button type="submit" class="primary-btn">Siguiente</button>
            </div>
        </form>
    </div>

    <script>
        // Obtener la URL de redirección
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect_after_login') || 'login.html';

        function selectAccount(name, email, picture) {
            // Redirigir de vuelta pasando los parámetros de login simulados
            const target = `${redirectUrl}?google_mock_login=true&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&picture=${encodeURIComponent(picture)}`;
            window.location.href = target;
        }

        function showCustomForm() {
            document.getElementById('account-chooser-view').style.display = 'none';
            document.getElementById('custom-form-view').style.display = 'flex';
        }

        function showChooser() {
            document.getElementById('custom-form-view').style.display = 'none';
            document.getElementById('account-chooser-view').style.display = 'flex';
        }

        function submitCustom(e) {
            e.preventDefault();
            const name = document.getElementById('custom-name').value.trim();
            const email = document.getElementById('custom-email').value.trim();
            // Usar una foto genérica de avatar para el nuevo registro
            const picture = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100';
            
            selectAccount(name, email, picture);
        }
    </script>
</body>
</html>
